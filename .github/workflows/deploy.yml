name: Lint,Test & Deploy
on: push
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with: 
                node-version: 18
            - name: Install Dependencies
              run: npm install
            - name: Run Linter
              run: npm run lint
    test:
        needs: lint
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with: 
                node-version: 18
            - name: Install Dependencies
              run: npm install
            - name: Run Tests
              run: npm test
    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with: 
                node-version: 18
            - name: Install Dependencies
              run: npm install
            - name: Build Project
              run: npm run build
            - name: Deploy Project
              run: echo "Deploying..."
